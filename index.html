<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hypotheek Live Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1c1c1e; /* iOS Dark Mode achtergrond */
            color: #ffffff;
            margin: 0;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }
        table {
            width: 100%;
            max-width: 320px;
            border-collapse: collapse;
            background-color: #2c2c2e;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        th, td {
            padding: 14px 16px;
            text-align: left;
            font-size: 0.95rem;
        }
        th {
            background-color: #3a3a3c;
            color: #0a84ff; /* iOS Systeemblauw */
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }
        .label {
            color: #eaeaea;
            font-weight: 500;
        }
        .waarde {
            color: #ffffff; /* Wit zoals gespecificeerd in jouw configuratie */
            text-align: right;
            font-weight: bold;
            font-variant-numeric: tabular-nums; /* Voorkomt dat cijfers verspringen bij updates */
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th colspan="2">Hypotheek Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="label">🏠 Actuele Hypotheek</td>
                <td id="hypotheek-bedrag" class="waarde">Laden...</td>
            </tr>
        </tbody>
    </table>

    <script>
        // CONFIGURATIE (Strict CET)
        const START_BEDRAG = 1258000; 
        const AFNAME_PER_MAAND = 15000;

        // De exacte absolute Unix-tijdstempel voor 27 jan 2026 23:00:00 CET
        const START_UNIX_MS = 1769551200000; 

        // BEREKENING TEMPO (op basis van gemiddeld 30,4375 dagen per maand)
        const MS_PER_MAAND = 30.4375 * 24 * 60 * 60 * 1000;
        const AFNAME_PER_MS = AFNAME_PER_MAAND / MS_PER_MAAND;

        const displayBedrag = document.getElementById('hypotheek-bedrag');

        // Functie die de huidige tijd van de iPhone dwingt naar de CET/CEST tijdzone
        function getHuidigeTijdInCetMs() {
            const nu = new Date();
            const cetTekst = nu.toLocaleString("en-US", { timeZone: "Europe/Stockholm" });
            return new Date(cetTekst).getTime();
        }

        // De live ticker (update elke 10 milliseconden)
        function berekenEnToonHypotheek() {
            const nuCetMs = getHuidigeTijdInCetMs(); 
            
            // Bereken het absolute verschil in milliseconden
            const verstrekenMs = nuCetMs - START_UNIX_MS;
            
            // Bereken de exacte actuele stand van de hypotheek
            let actueelBedrag = START_BEDRAG - (verstrekenMs * AFNAME_PER_MS);
            if (actueelBedrag < 0) actueelBedrag = 0;
            
            // Toon het bedrag als Zweedse Kronen (kr) met 2 decimalen
            displayBedrag.innerText = actueelBedrag.toLocaleString('sv-SE', { 
                style: 'currency', 
                currency: 'SEK', 
                minimumFractionDigits: 2, 
                maximumFractionDigits: 2 
            });
        }

        // Voer direct eenmalig uit bij het laden van de pagina
        berekenEnToonHypotheek();

        // Start de snelle interval van 10ms voor vloeiende live weergave in de browser
        setInterval(berekenEnToonHypotheek, 10);
    </script>

</body>
</html>
