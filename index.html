<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Tabel Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1c1c1e;
            color: #ffffff;
            margin: 0;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }
        table {
            width: 100%;
            max-width: 320px;
            border-collapse: collapse;
            background-color: #2c2c2e;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        th, td {
            padding: 10px 14px;
            text-align: left;
            font-size: 0.9rem;
        }
        th {
            background-color: #3a3a3c;
            color: #0a84ff;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }
        tr {
            border-bottom: 1px solid #3a3a3c;
        }
        tr:last-child {
            border-bottom: none;
        }
        .label {
            color: #eaeaea;
            font-weight: 500;
        }
        .waarde {
            color: #30d158;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>Label</th>
                <th style="text-align: right;">Waarde</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="label">🔋 Batterij</td>
                <td class="waarde">84%</td>
            </tr>
            <tr>
                <td class="label">☀️ Temperatuur</td>
                <td class="waarde">19°C</td>
            </tr>
            <tr>
                <td class="label">🏃 Stappen</td>
                <td id="stappen-teller" class="waarde">6.420</td>
            </tr>
            <tr>
                <td class="label">☕ Koffie consumptie</td>
                <td class="waarde">3 koppen</td>
            </tr>
            <tr>
                <td class="label">📶 Wi-Fi Signaal</td>
                <td class="waarde">Uitstekend</td>
            </tr>
        </tbody>
    </table>

    <script>
        function updateStappen() {
            // Bereken een willekeurig heel getal tussen 1.000 en 1.000.000
            const min = 1000;
            const max = 1000000;
            const randomStappen = Math.floor(Math.random() * (max - min + 1)) + min;
            
            // Toon het getal met Nederlandse duizendtal-punten (bijv. 842.105)
            document.getElementById("stappen-teller").innerText = randomStappen.toLocaleString('nl-NL');
        }

        // Voer de functie direct uit bij het laden van de pagina
        updateStappen();

        // Herhaal de functie elke 1000 milliseconden (1 seconde)
        setInterval(updateStappen, 1000);
    </script>

</body>
</html>
